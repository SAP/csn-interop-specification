pre-commit:
  commands:
    spec-generate:
      glob: "./spec/*/*.yaml"
      run: |
        npm run generate
        git add ./src/generated/spec/v1/types/csn-interop-effective.ts
        git add ./src/generated/spec/v1/schemas/*
    format:
      glob: "**/*.{md,json,yaml,js,ts}"
      run: npm run format
      stage_fixed: true
